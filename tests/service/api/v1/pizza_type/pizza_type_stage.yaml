---

name: Pizza_type stage

description:
  Reusable test stage for creating pizza types and related resources

variables:
  pizza_name: "Mozzarella"
  pizza_price: 5
  pizza_description: "Italian quality"

  sauce_name: "Marinara1"
  sauce_description: "Classic tomato sauce with garlic and herbs1."

stages:

  - id: create_sauce
    name: Create the test sauce
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/sauce
      json: &sauce
        name: "{sauce_name:s}"
        description: "{sauce_description}"
      method: POST
    response:
      status_code: 201
      strict: false
      json:
        <<: *sauce
        id: !anything
      save:
        json:
          sauce_id: id

  - id: create_pizza_type
    name: Create the test pizza_type
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types
      json:
        name: "{pizza_name:s}"
        price: !float "{pizza_price:f}"
        description: "{pizza_description}"
        dough_id: "{dough_id}"
        default_sauce_id: "{sauce_id}"
      method: POST
    response:
      status_code: 201
      json:
        name: "{pizza_name:s}"
        price: !float "{pizza_price:f}"
        description: "{pizza_description}"
        default_sauce_id: "{sauce_id}"
        id: !anything
      save:
        json:
          pizza_type_id: id

  - id: delete_pizza_type
    name: Delete pizza_type with id
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/{pizza_type_id}
      method: DELETE
    response:
      status_code: 204

  - id: delete_sauce
    name: delete sauce
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/sauce/{sauce_id}
      method: DELETE
    response:
      status_code: 204

