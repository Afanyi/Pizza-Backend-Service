test_name: Make sure server implements CRUD functionality for pizza_type endpoint

includes:
  - !include common.yaml

stages:
  ################################################################################################
  # 1. CREATE DOUGH
  ################################################################################################
  - name: Verify 201 when we create a new dough
    max_retries: 10
    delay_after: 2
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/doughs
      json: &dough_request
        name: "{dough_name:s}"
        price: !float "{dough_price:f}"
        description: "{dough_description}"
        stock: !int "{dough_stock:d}"
      method: POST
    response:
      status_code: 201
      json:
        name: "{dough_name:s}"
        price: !float "{dough_price:f}"
        description: "{dough_description}"
        stock: !int "{dough_stock:d}"
        id: !anything
      save:
        json:
          dough_id: id

  ################################################################################################
  # 2. CREATE SAUCE
  ################################################################################################
  - name: Verify 201 when we create a new sauce
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/sauce
      json: &sauce_request
        name: "{sauce_name:s}"
        description: "{sauce_description}"
      method: POST
    response:
      status_code: 201
      json:
        name: "{sauce_name:s}"
        description: "{sauce_description}"
        id: !anything
      save:
        json:
          sauce_id: id

  ################################################################################################
  # 3. CREATE PIZZA
  ################################################################################################
  # - Separate request and response anchors to avoid "id: !anything" in request
  ################################################################################################
  - name: Verify 201 when we create a new pizza
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types
      json: &pizza_request
        name: "{pizza_name:s}"
        price: !float "{pizza_price:f}"
        description: "{pizza_description}"
        default_sauce_id: "{sauce_id}"
        dough_id: "{dough_id}"
      method: POST
    response:
      status_code: 201
      json: &pizza_response
        name: "{pizza_name:s}"
        price: !float "{pizza_price:f}"
        description: "{pizza_description}"
        default_sauce_id: "{sauce_id}"
        id: !anything
      save:
        json:
          pizza_type_id: id

  ################################################################################################
  # 4. CREATE PIZZA WITH EXISTING NAME -> SHOULD RETURN 303
  ################################################################################################
  - name: Verify 303 when creating a pizza with an existing name
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types
      json:
        <<: *pizza_request
        price: 9.99
        description: "Duplicate pizza"
      method: POST
    response:
      status_code: 303
      headers:
        location: "http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/{pizza_type_id}"

  ################################################################################################
  # 5. CREATE PIZZA WITH NON-EXISTENT DOUGH -> 404
  ################################################################################################
  - name: Verify 404 when creating a pizza with a non-existent dough
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types
      json:
        name: "InvalidPizza"
        price: 12.00
        description: "Invalid dough ID"
        dough_id: "{not_available_id}"
      method: POST
    response:
      status_code: 404

  ################################################################################################
  # 6. RETRIEVE PIZZA BY ID
  ################################################################################################
  - name: Verify we can retrieve the pizza by ID
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/{pizza_type_id}
      method: GET
    response:
      status_code: 200
      json:
        <<: *pizza_response
        id: "{pizza_type_id}"

  ################################################################################################
  # 7. GET A NON-EXISTENT PIZZA -> 404
  ################################################################################################
  - name: Verify 404 for a non-existent pizza ID
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/{not_available_id}
      method: GET
    response:
      status_code: 404

  ################################################################################################
  # 8. UPDATE PIZZA (PUT)
  ################################################################################################
  - name: Verify we can update the pizza
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/{pizza_type_id}
      method: PUT
      json:
        <<: *pizza_request
        description: "Updated description"
    response:
      status_code: 204

  ################################################################################################
  # 9. UPDATE PIZZA NAME -> SHOULD CREATE NEW PIZZA (201)
  ################################################################################################
  - name: Verify updating a pizza with a new name creates a new pizza
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/{pizza_type_id}
      method: PUT
      json:
        <<: *pizza_request
        name: "Cheese"
    response:
      status_code: 201
      json:
        name: "Cheese"
        price: !float "{pizza_price:f}"
        description: "{pizza_description}"
        default_sauce_id: "{sauce_id}"
        id: !anything
      save:
        json:
          new_pizza_id: id

  ################################################################################################
  # 10. UPDATE NON-EXISTENT PIZZA -> 404
  ################################################################################################
  - name: Verify 404 when updating a non-existent pizza
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/00000000-0000-0000-0000-000000000000
      method: PUT
      json:
        <<: *pizza_request
        name: "NonExistentPizza"
    response:
      status_code: 404

  ################################################################################################
  # 11. CREATE A TOPPING
  ################################################################################################
  - name: Create a topping and verify 201
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/toppings
      json: &topping_request
        name: "{topping_name:s}"
        price: !float "{topping_price:f}"
        description: "{topping_description}"
        stock: !int "{topping_stock:d}"
      method: POST
    response:
      status_code: 201
      json:
        name: "{topping_name:s}"
        price: !float "{topping_price:f}"
        description: "{topping_description}"
        stock: !int "{topping_stock:d}"
        id: !anything
      save:
        json:
          topping_id: id

  ################################################################################################
  # 12. ADD TOPPING TO PIZZA -> 201
  ################################################################################################
  - name: Verify 201 when adding topping to pizza
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/{pizza_type_id}/toppings
      json: &pizza_topping_relation
        quantity: !int "{quantity:d}"
        topping_id: "{topping_id}"
      method: POST
    response:
      status_code: 201
      json:
        quantity: !int "{quantity:d}"
        topping_id: "{topping_id}"

  ################################################################################################
  # 13. ADD TOPPING TO NON-EXISTENT PIZZA -> 404
  ################################################################################################
  - name: Verify 404 when adding topping to a non-existent pizza
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/{not_available_id}/toppings
      json:
        quantity: !int "{quantity:d}"
        topping_id: "{topping_id}"
      method: POST
    response:
      status_code: 404

  ################################################################################################
  # 14. ADD NON-EXISTENT TOPPING -> 404
  ################################################################################################
  - name: Verify 404 when adding a non-existent topping
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/{pizza_type_id}/toppings
      json:
        quantity: !int "{quantity:d}"
        topping_id: "{not_available_id}"
      method: POST
    response:
      status_code: 404

  ################################################################################################
  # 15. DUPLICATE TOPPING-PIZZA RELATION -> 303
  ################################################################################################
  - name: Verify 303 if topping already exists on pizza
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/{pizza_type_id}/toppings
      json:
        <<: *pizza_topping_relation
      method: POST
    response:
      status_code: 303
      headers:
        location: "http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/{pizza_type_id}/toppings"

  ################################################################################################
  # 16. GET ALL TOPPINGS FOR PIZZA -> 200
  ################################################################################################
  - name: Verify 200 and toppings returned for pizza
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/{pizza_type_id}/toppings
      method: GET
    response:
      status_code: 200
      json:
        - quantity: !int "{quantity:d}"
          topping_id: "{topping_id}"

  ################################################################################################
  # 17. GET TOPPINGS FROM NON-EXISTENT PIZZA -> 404
  ################################################################################################
  - name: Verify 404 when getting toppings for non-existent pizza
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/{not_available_id}/toppings
      method: GET
    response:
      status_code: 404

  ################################################################################################
  # 18. GET DOUGH FOR PIZZA -> 200
  ################################################################################################
  - name: Verify 200 when retrieving dough of existing pizza
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/{pizza_type_id}/dough
      method: GET
    response:
      status_code: 200
      json:
        name: "{dough_name:s}"
        price: !float "{dough_price:f}"
        description: "{dough_description}"
        stock: !int "{dough_stock:d}"
        id: "{dough_id}"

  ################################################################################################
  # 19. GET DOUGH FOR NON-EXISTENT PIZZA -> 404
  ################################################################################################
  - name: Verify 404 when retrieving dough of non-existent pizza
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/{not_available_id}/dough
      method: GET
    response:
      status_code: 404

  ################################################################################################
  # 20. DELETE NON-EXISTENT PIZZA -> 404
  ################################################################################################
  - name: Verify 404 when deleting non-existent pizza
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/00000000-0000-0000-0000-000000000000
      method: DELETE
    response:
      status_code: 404

  ################################################################################################
  # 21. CLEANUP STEPS
  ################################################################################################
  - name: Delete the original pizza
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/{pizza_type_id}
      method: DELETE
    response:
      status_code: 204

  - name: Delete the newly created pizza
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/pizza-types/{new_pizza_id}
      method: DELETE
    response:
      status_code: 204

  - name: Delete the topping
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/toppings/{topping_id}
      method: DELETE
    response:
      status_code: 204

  - name: Delete the sauce
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/sauce/{sauce_id}
      method: DELETE
    response:
      status_code: 204

  - name: Delete the dough
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/doughs/{dough_id}
      method: DELETE
    response:
      status_code: 204
